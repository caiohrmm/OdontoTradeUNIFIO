services:
  postgres:
    image: postgres:16
    container_name: desapego-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: desapego
      POSTGRES_USER: desapego
      POSTGRES_PASSWORD: desapego
    volumes:
      - desapego_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desapego -d desapego"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  desapego_pgdata:
