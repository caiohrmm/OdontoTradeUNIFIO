# Test profile: usa mesmo Postgres (localhost). Rode docker compose antes dos testes
# ou use -Dspring.profiles.active=test com banco disponível.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/desapego
    username: desapego
    password: desapego
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

jwt:
  secret: test-secret-with-at-least-32-characters-long-for-hs256
  expiration-ms: 3600000
