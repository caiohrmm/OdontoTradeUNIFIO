spring:
  application:
    name: unifio-odonto-desapego-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/desapego}
    username: ${SPRING_DATASOURCE_USERNAME:desapego}
    password: ${SPRING_DATASOURCE_PASSWORD:desapego}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# CORS: origens permitidas (env: FRONTEND_ORIGIN, default localhost:3000)
cors:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# JWT (Auth)
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Cloudinary (upload de imagens). Use CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:desapego}
  max-file-size-mb: ${CLOUDINARY_MAX_FILE_SIZE_MB:5}

# Springdoc / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

---
# Profile: local (Docker Compose Postgres)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/desapego
    username: desapego
    password: desapego

---
# Profile: default (Neon ou env vars)
# Configure SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Para Neon: SPRING_DATASOURCE_URL=jdbc:postgresql://host/db?sslmode=require (use user/pass do painel)
spring:
  config:
    activate:
      on-profile: default
